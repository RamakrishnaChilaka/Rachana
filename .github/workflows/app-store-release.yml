name: App Store Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version label used in the uploaded package name, for example v0.2.0
        required: true
        default: v0.2.0

permissions:
  contents: read

concurrency:
  group: app-store-release-${{ github.ref }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  mac-app-store:
    name: Build and upload Electron MAS package
    if: ${{ vars.RACHANA_DISTRIBUTION_ENABLED == 'true' }}
    runs-on: macos-15
    environment: release
    env:
      APP_NAME: Rachana
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Import application and installer certificates
        env:
          APP_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APP_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          INSTALLER_CERTIFICATE_BASE64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_BASE64 }}
          INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          keychain="$RUNNER_TEMP/rachana-mas.keychain-db"
          echo "$APP_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/application.p12"
          echo "$INSTALLER_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/installer.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security import "$RUNNER_TEMP/application.p12" -k "$keychain" -P "$APP_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security import "$RUNNER_TEMP/installer.p12" -k "$keychain" -P "$INSTALLER_CERTIFICATE_PASSWORD" -T /usr/bin/productbuild
          security list-keychains -d user -s "$keychain"
          security default-keychain -s "$keychain"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain"

      - name: Prepare App Store Connect key
        env:
          PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          key="$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$PRIVATE_KEY_BASE64" | base64 --decode > "$key"
          chmod 600 "$key"

      - name: Prepare provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.MAS_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          profile="$RUNNER_TEMP/Rachana.provisionprofile"
          echo "$PROFILE_BASE64" | base64 --decode > "$profile"
          echo "MAS_PROVISION_PROFILE=$profile" >> "$GITHUB_ENV"

      - name: Build signed MAS package
        env:
          CSC_NAME: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npm run build && npx electron-builder --mac mas --arm64 --publish never --config.mas.provisioningProfile="$MAS_PROVISION_PROFILE"

      - name: Resolve package path
        run: |
          set -euo pipefail
          package="$(find release -maxdepth 1 -type f -name '*.pkg' -print -quit)"
          test -n "$package"
          destination="dist/mas/Rachana-${{ inputs.version }}-macos-arm64.pkg"
          mkdir -p dist/mas
          cp "$package" "$destination"
          echo "MAS_PKG_PATH=$destination" >> "$GITHUB_ENV"

      - name: Upload package to App Store Connect
        run: npm run mas:upload

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: rachana-macos-arm64-mas-pkg
          path: ${{ env.MAS_PKG_PATH }}
          if-no-files-found: error
