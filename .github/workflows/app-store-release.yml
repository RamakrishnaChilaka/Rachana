name: App Store Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version label used in the uploaded package name, for example v0.1.0
        required: true
        default: v0.1.0

permissions:
  contents: read

concurrency:
  group: app-store-release-${{ github.ref }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  mac-app-store:
    name: Build and Upload MAS Package
    if: ${{ vars.RACHANA_DISTRIBUTION_ENABLED == 'true' }}
    runs-on: macos-15
    env:
      APP_NAME: Rachana
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_INSTALLER_SIGNING_IDENTITY: ${{ secrets.APPLE_INSTALLER_SIGNING_IDENTITY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      MAS_PKG_PATH: dist/mas/Rachana-${{ inputs.version }}-macos-arm64.pkg
      MAS_TARGET_DIR: aarch64-apple-darwin
      CARGO_TARGET_DIR: ${{ github.workspace }}/src-tauri/target

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Import Apple signing certificates
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_BASE64 }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          test -n "$APPLE_CERTIFICATE_BASE64"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          test -n "$APPLE_INSTALLER_CERTIFICATE_BASE64"
          test -n "$APPLE_INSTALLER_CERTIFICATE_PASSWORD"
          test -n "$KEYCHAIN_PASSWORD"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/apple-distribution.p12"
          echo "$APPLE_INSTALLER_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/apple-installer.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$RUNNER_TEMP/apple-distribution.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign

          security import "$RUNNER_TEMP/apple-installer.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_INSTALLER_CERTIFICATE_PASSWORD" \
            -T /usr/bin/productbuild

          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Prepare App Store Connect credentials
        env:
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail

          test -n "$APPLE_API_KEY_ID"
          test -n "$APPLE_API_ISSUER"
          test -n "$APPLE_API_PRIVATE_KEY_BASE64"

          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$APPLE_API_PRIVATE_KEY_BASE64" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          chmod 600 "$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"

      - name: Prepare Mac App Store provisioning profile
        env:
          MAS_PROVISION_PROFILE_BASE64: ${{ secrets.MAS_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail

          test -n "$APPLE_TEAM_ID"
          test -n "$MAS_PROVISION_PROFILE_BASE64"

          echo "$MAS_PROVISION_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/Rachana.provisionprofile"
          echo "MAS_PROVISION_PROFILE=$RUNNER_TEMP/Rachana.provisionprofile" >> "$GITHUB_ENV"

      - name: Build signed Mac App Store app
        run: npm run mas:build

      - name: Build signed Mac App Store package
        run: npm run mas:pkg

      - name: Upload package to App Store Connect
        run: npm run mas:upload

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: rachana-macos-arm64-mas-pkg
          path: ${{ env.MAS_PKG_PATH }}
          if-no-files-found: error
