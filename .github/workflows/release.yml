name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Electron app
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit and integration tests
        run: npm run test:run

      - name: Build unpacked Electron app
        run: npm run package

      - name: Run packaged Electron smoke workflow
        env:
          RACHANA_ELECTRON_EXECUTABLE: ${{ github.workspace }}/release/linux-unpacked/rachana
        run: xvfb-run -a npx playwright test --config playwright.config.ts

  build-linux:
    name: Build Linux x64 AppImage
    if: ${{ vars.RACHANA_DISTRIBUTION_ENABLED == 'true' }}
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build AppImage
        run: npm run build && npx electron-builder --linux AppImage --x64 --publish never

      - name: Stage release assets
        run: |
          set -euo pipefail
          mkdir -p dist/github-release
          mapfile -t artifacts < <(find release -maxdepth 1 -type f -name '*.AppImage' -print)
          test "${#artifacts[@]}" -eq 1
          artifact="${artifacts[0]}"
          destination="dist/github-release/Rachana-${GITHUB_REF_NAME}-linux-x86_64.AppImage"
          cp "$artifact" "$destination"
          (cd "$(dirname "$destination")" && sha256sum "$(basename "$destination")" > "$(basename "$destination").sha256")

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: rachana-linux-x86_64-appimage
          path: dist/github-release/*
          if-no-files-found: error

  build-windows:
    name: Build Windows ${{ matrix.label }} installers
    if: ${{ vars.RACHANA_DISTRIBUTION_ENABLED == 'true' }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-2025
            label: x86_64
            node_arch: x64
            builder_arch: x64
            targets: nsis msi
            require_msi: true
          - runner: windows-11-arm
            label: arm64
            node_arch: arm64
            builder_arch: arm64
            targets: nsis
            require_msi: false
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 26
          architecture: ${{ matrix.node_arch }}
          cache: npm

      - name: Verify Node architecture
        shell: pwsh
        run: |
          $actual = node -p "process.arch"
          if ($actual -ne "${{ matrix.node_arch }}") {
            throw "Expected Node ${{ matrix.node_arch }}, found $actual."
          }

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installers
        run: npm run build && npx electron-builder --win ${{ matrix.targets }} --${{ matrix.builder_arch }} --publish never

      - name: Stage release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path 'dist/github-release' | Out-Null
          $exe = @(Get-ChildItem 'release/*.exe' -File)
          $msi = @(Get-ChildItem 'release/*.msi' -File)
          if ($exe.Count -ne 1) {
            throw "Expected one NSIS installer; found $($exe.Count)."
          }
          $exeDestination = "dist/github-release/Rachana-$env:GITHUB_REF_NAME-windows-${{ matrix.label }}-setup.exe"
          Copy-Item $exe[0].FullName $exeDestination
          $assets = @($exeDestination)
          if ('${{ matrix.require_msi }}' -eq 'true') {
            if ($msi.Count -ne 1) {
              throw "Expected one MSI installer; found $($msi.Count)."
            }
            $msiDestination = "dist/github-release/Rachana-$env:GITHUB_REF_NAME-windows-${{ matrix.label }}.msi"
            Copy-Item $msi[0].FullName $msiDestination
            $assets += $msiDestination
          } elseif ($msi.Count -ne 0) {
            throw "Expected no ARM64 MSI installer; found $($msi.Count)."
          }
          foreach ($asset in $assets) {
            $hash = (Get-FileHash -Algorithm SHA256 $asset).Hash.ToLowerInvariant()
            "$hash  $(Split-Path -Leaf $asset)" | Set-Content -Encoding ascii "$asset.sha256"
          }

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: rachana-windows-${{ matrix.label }}-installers
          path: dist/github-release/*
          if-no-files-found: error

  build-macos:
    name: Build macOS arm64 DMG
    if: ${{ vars.RACHANA_DISTRIBUTION_ENABLED == 'true' && vars.RACHANA_MACOS_RELEASE_ENABLED == 'true' }}
    needs: validate
    runs-on: macos-15
    environment: release
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import Developer ID certificate
        if: ${{ vars.RACHANA_MACOS_SIGNED_RELEASE_ENABLED == 'true' }}
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$CERTIFICATE_BASE64"
          test -n "$CERTIFICATE_PASSWORD"
          keychain="$RUNNER_TEMP/rachana-signing.keychain-db"
          password="$(uuidgen)"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/developer-id.p12"
          security create-keychain -p "$password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$password" "$keychain"
          security import "$RUNNER_TEMP/developer-id.p12" -k "$keychain" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$keychain"
          security default-keychain -s "$keychain"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$password" "$keychain"

      - name: Prepare notarization key
        if: ${{ vars.RACHANA_MACOS_SIGNED_RELEASE_ENABLED == 'true' }}
        env:
          PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          set -euo pipefail
          test -n "$PRIVATE_KEY_BASE64"
          key="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$PRIVATE_KEY_BASE64" | base64 --decode > "$key"
          chmod 600 "$key"
          echo "APPLE_API_KEY=$key" >> "$GITHUB_ENV"

      - name: Build signed and notarized DMG
        if: ${{ vars.RACHANA_MACOS_SIGNED_RELEASE_ENABLED == 'true' }}
        env:
          CSC_NAME: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npm run build && npx electron-builder --mac dmg --arm64 --publish never --config.mac.notarize=true

      - name: Build unsigned DMG
        if: ${{ vars.RACHANA_MACOS_SIGNED_RELEASE_ENABLED != 'true' }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build && npx electron-builder --mac dmg --arm64 --publish never --config.mac.notarize=false

      - name: Stage release assets
        run: |
          set -euo pipefail
          mkdir -p dist/github-release
          shopt -s nullglob
          artifacts=(release/*.dmg)
          test "${#artifacts[@]}" -eq 1
          artifact="${artifacts[0]}"
          signed_label="unsigned"
          if [[ "${{ vars.RACHANA_MACOS_SIGNED_RELEASE_ENABLED }}" == "true" ]]; then signed_label="signed"; fi
          destination="dist/github-release/Rachana-${GITHUB_REF_NAME}-macos-arm64-${signed_label}.dmg"
          cp "$artifact" "$destination"
          (cd "$(dirname "$destination")" && shasum -a 256 "$(basename "$destination")" > "$(basename "$destination").sha256")

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: rachana-macos-arm64-dmg
          path: dist/github-release/*
          if-no-files-found: error

  github-release:
    name: Create GitHub Release
    if: ${{ always() && vars.RACHANA_DISTRIBUTION_ENABLED == 'true' && needs.validate.result == 'success' && needs.build-linux.result == 'success' && needs.build-windows.result == 'success' && (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped') }}
    needs: [validate, build-linux, build-windows, build-macos]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist/github-release
          merge-multiple: true

      - name: List release artifacts
        run: find dist/github-release -maxdepth 1 -type f -print

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/github-release/*
          generate_release_notes: true
          body: |
            ## Downloads

            - **Windows x86_64:** NSIS setup `.exe` or MSI
            - **Windows ARM64:** NSIS setup `.exe`
            - **Linux x86_64:** AppImage
            - **macOS Apple Silicon:** DMG when enabled

            Rachana 0.2 uses the bundled Electron Chromium runtime on every platform.
            Unsigned installers may trigger platform security warnings; verify the adjacent SHA-256 file before installation.

            [View the source for this release](https://github.com/${{ github.repository }}/tree/${{ github.ref_name }})
